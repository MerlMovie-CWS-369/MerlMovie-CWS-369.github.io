<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./img/favicon.ico" type="image/icon type">
    <link rel="stylesheet" href="./css/style.css">
    <title>MerlMovie</title>
</head>

<body>

    <div id="linear-shadow"></div>

    <header id="header-id">
        <div id="header-row">
            <img src="./img/logo.png" id="header-logo">
            <h id="pr-pl-btn" onclick="onPrivacyClick();">Privacy Policy</h>
        </div>
        <div id="header-title">
            <h3 id="title">
                Unlimited movies, TV series, and anime.
            </h3>
            <h4 id="subtitle">
                Watch anywhere, anytime on your mobile device. <br> Ready to watch?
                Install Now.
            </h4>
            <div id="store-btns">
                <div class="app-icons">
                    <a href="https://apps.apple.com/app/id6444127460">
                        <img class="apple"
                            src="./img/apple_btn.svg"
                            alt="Download on the App Store">
                    </a>
                    <a href='https://play.google.com/store/apps/details?id=com.NOUVANNET.merlmovie'>
                        <img class="android" alt='Get it on Google Play'
                            src='./img/play_store_btn.png' />
                    </a>
                </div>
            </div>
        </div>
    </header>

    <script>
        function onPrivacyClick() {
            window.open("./privacy-policy");
        }
    </script>

</body>

</html>

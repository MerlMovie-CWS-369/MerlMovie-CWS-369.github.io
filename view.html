<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:url" content="MerlMovie" id="meta-url">
    <meta property="og:type" content="View" id="meta-type">
    <meta property="og:title" content="Watch unlimited movies, TV series, & anime for free on your phone." id="meta-title">
    <meta property="og:description" content="MerlMovie you can watch/download unlimited movies for free, especially you can find your favorite more than 25000 movies that we have in our app. also the videos have subtitles for easy to watch. you will always get notifications when we add something new to explore every week. what are you waiting for? Just install now!" id="meta-story">
    <meta property="og:image" content="https://play-lh.googleusercontent.com/RnX8uykkBdGlB9ELLEQ_3Ekb80Ma_uWFbRD8WlC64dXHgQzXo_3-gyTFaVaft6Aec5mJ=w1024-h768-rw" id="meta-image">
    <meta property="al:android:url" content="open://merlmovie" id="meta-android-url">
    <meta property="al:android:package" content="com.NOUVANNET.merlmovie">
    <meta property="al:android:app_name" content="MerlMovie">
    <link rel="icon" href="./img/favicon.ico" ype="image/icon type">
    <link rel="stylesheet" href="./css/view.css">
    <link rel="stylesheet" href="./css/style.css">
    <title id="title-movie">MerlMovie</title>
</head>

<body>

    <div id="bg-page">
        <img id="bg-img" src="" alt="">
    </div>

    <div id="body-container">
        <div id="self-info">
            <img id="yt-banner" style="display: none;" src="" alt="">
            <iframe id="yt-player" src="" frameborder="0" allowfullscreen></iframe>
            <div id="poster-info">
                <img id="poster-img" src="" alt="">
                <div id="poster-title-info">
                    <p id="poster-title"></p>
                    <p id="header-info-text"></p>
                    <p id="header-info-text1"></p>
                    <button id="watch-now-btn"><img src="./img/play.svg" alt=""> <p>Watch Now</p></button>
                </div>
                <p id="story-info-text"></p>
            </div>
            <input type="checkbox" id="trigger">
            <label for="trigger" id="cast-btn">Cast & Crew</label>
            <div id="cast-list"></div>
        </div>
        <div id="related-container">
            <div id="related-options">
                <button id="yml-option">You May Like</button>
                <button id="trd-option">Trending</button>
            </div>
            <div id="related-list"></div>
        </div>
    </div>

    <nav id="navbar">
        <img src="./img/logo.png" alt="" , id="nav-logo">
        <div id="nav-title-btn">
            <h3>Install App to watch full movies, TV series, & anime</h3>
            <button id="install-btn">Install Now</button>
        </div>
    </nav>

    <div id="loading">
        <div class="loading-lds"><div></div><div></div><div></div></div>
    </div>

    <div id="error">
        <div id="error-bad-request">
            <img src="https://visualpharm.com/assets/159/Sad%20Cloud-595b40b85ba036ed117daf84.svg" alt="">
            <p>You've sent a bad request!</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.2.1/axios.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script type="module" src="./js/view.js"></script>
</body>

</html>
